name: Build and Check Android APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ပြင်ဆင်ချက် - Warning များကြောင့် Build အကျမခံဘဲ Text Report ထုတ်ခိုင်းခြင်း
      - name: Run Code Lint Check
        run: gradle lintDebug -Pandroid.experimental.lint.textReport=true || true

      # ၂။ Java Code များ Compilation စစ်ဆေးရန်
      - name: Compile Java Check
        run: gradle compileDebugJavaWithJavac

      # ၃။ Debug APK တည်ဆောက်မည်
      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Next-IDE-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
